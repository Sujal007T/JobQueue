spring:
  application:
    name: jobqueue
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobqueue}
    username: ${DB_USER:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always

jobqueue:
  worker:
    threads: 8
    poll-interval-ms: 1000
    batch-size: 5
    shutdown-timeout-seconds: 30
    stale-threshold-minutes: 10
  retry:
    default-base-delay-ms: 2000
    max-delay-ms: 3600000
    policies:
      send-email: 5000
      process-payment: 10000
